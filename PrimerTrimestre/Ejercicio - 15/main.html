<!DOCTYPE html>

</head>
<body>
    <script>
            function Acumulador(inicio)
            {
                this.value= +inicio;

                this.read= function(){ this.value += +prompt("num: ", 0);}
            }
            let acumulador=new Acumulador(1);
            
            acumulador.read();
            
            acumulador.read();
            alert(acumulador.value);
    </script>
</body>
