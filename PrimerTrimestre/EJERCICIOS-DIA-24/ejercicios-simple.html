function camelizar(txt) 
{
    let partes = txt.split('-');
    for (let i = 1; i < partes.length; i++) 
    {
        partes[i] = partes[i][0].toUpperCase() + partes[i].slice(1);
    }
    let res = "";
    for (let i = 0; i < partes.length; i++) res += partes[i];
    return res;
}
console.log("Ejercicio 1: ")
console.log(camelizar("hola-buenas-tardes"));

function rangoFiltrado(arr, min, max) 
{
    let res = [];
    for (let i = 0; i < arr.length; i++) 
    {
        if (arr[i] >= min && arr[i] <= max) res.push(arr[i]);
    }
    return res;
}
let arr = [12, 5, 2, 4, 8, 1];
console.log("Ejercicio 2: ")
console.log(rangoFiltrado(arr, 1, 4));

function rangoEnSitio(arr, min, max) {
    for (let i = 0; i < arr.length; i++) 
    {
        if (arr[i] < min || arr[i] > max) { arr.splice(i, 1); i--; }
    }
}
let arr2 = [12, 4, 5, 2, 3, 1, 5, 25, 42, 1];

function copiaOrdenada(arr) 
{
    let res = [];
    for (let i = 0; i < arr.length; i++) res.push(arr[i]);
    for (let i = 0; i < res.length; i++) 
    {
        for (let j = i+1; j < res.length; j++) 
        {
            if (res[i] > res[j]) 
            {
                let tmp = res[i]; res[i] = res[j]; res[j] = tmp;
            }
        }
    }
    return res;
}

function Calculadora() 
{
    this.ops = {"+": function(a,b){return a+b;}, "-": function(a,b){return a-b;}};
    this.calcular = function(txt) 
    {
        let partes = txt.split(' ');
        let a = parseFloat(partes[0]);
        let b = parseFloat(partes[2]);
        let op = partes[1];
        if (this.ops[op] && !isNaN(a) && !isNaN(b)) return this.ops[op](a,b);
        return NaN;
    }
}
let calc = new Calculadora();
console.log("Ejercicio 6:")

function ordenarEdad(arr) 
{
    for (let i = 0; i < arr.length; i++) 
    {
        for (let j = i+1; j < arr.length; j++) 
        {
            if (arr[i].edad > arr[j].edad) 
            {
                let tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
            }
        }
    }
}

function mezclar(arr) 
{
    for (let i = 0; i < arr.length; i++) 
    {
        let j = Math.floor(Math.random() * arr.length);
        let tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
}

function promedioEdad(us) 
{
    let suma = 0;
    for (let i = 0; i < us.length; i++) suma += us[i].edad;
    return suma / us.length;
}

function unico(arr) 
{
    let res = [];
    for (let i = 0; i < arr.length; i++) 
    {
        let existe = false;
        for (let j = 0; j < res.length; j++) if (res[j] === arr[i]) existe = true;
        if (!existe) res.push(arr[i]);
    }
    return res;
}

console.log("Ejercicio 12");
console.log(unico(strs));

function agruparPorId(arr) 
{
    let res = {};
    for (let i = 0; i < arr.length; i++) res[arr[i].id] = arr[i];
    return res;
}
