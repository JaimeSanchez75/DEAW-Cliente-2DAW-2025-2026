<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>¡Pasa la Cabra! - Trivia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <button class=" volver  btn float-start z-index-3" onclick="window.location.href='./../'">
        <i class="bi bi-arrow-left"></i> Volver
    </button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="bomb-card text-center">
                    <!-- Canvas bomba -->
                    <div class="bomb-canvas d-inline-block mb-3"><canvas id="bombCanvas" width="200" height="200"></canvas></div>
                    <!-- Temporizador -->
                    <div class="timer-text mb-3" id="timerDisplay">00:30</div>
                    <!-- Pregunta -->
                    <div id="quizContainer" class="mt-3">
                        <div class="spinner-border text-warning" role="status"></div>
                        <p>Cargando Trivia...</p>
                    </div>
                    <!-- Botón reinicio / Nueva partida -->
                    <div class="mt-4"><button id="resetGameBtn" class="btn btn-outline-warning btn-lg"><i class="bi bi-arrow-repeat"></i> Nueva partida</button></div>
                    <footer class="mt-3 small"><i class="bi bi-exclamation-triangle-fill text-danger"></i> <span class="text-white">¡Pasa la Cabra!</span> | Responde rápido las preguntas para desactivar la bomba.</footer>
                </div>
                <!-- Récord local -->
                <div class="text-center mt-3 text-light bg-dark rounded-pill p-2">Mejor tiempo  <span id="bestTimeSpan">00:00</span></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="bomba.js"></script>
</body>
</html>
