<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enlaces Externos Naranjas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <h1>Lista de enlaces</h1>
  <p>Los enlaces externos se marcarán de color naranja:</p>

  <ul class="list-group">
    <li class="list-group-item"><a href="http://google.com">http://google.com</a></li>
    <li class="list-group-item"><a href="/tutorial">/tutorial.html</a></li>
    <li class="list-group-item"><a href="local/path">local/path</a></li>
    <li class="list-group-item"><a href="ftp://ftp.com/my.zip">ftp://ftp.com/my.zip</a></li>
    <li class="list-group-item"><a href="http://nodejs.org">http://nodejs.org</a></li>
    <li class="list-group-item"><a href="http://internal.com/test">http://internal.com/test</a></li>
  </ul>

  <script>
    // Seleccionamos todos los enlaces
    let links = document.querySelectorAll('a');

    for (let link of links) {
      let href = link.getAttribute('href');
      if (!href) continue;                // Ignorar si no tiene href
      if (!href.includes('://')) continue; // Ignorar enlaces locales
      if (href.startsWith('http://internal.com')) continue; // Ignorar enlaces internos

      // Establecer estilo directamente
      link.style.color = 'orange';
    }
  </script>

</body>
</html>
