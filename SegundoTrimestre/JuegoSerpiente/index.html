<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake - Juego de la Serpiente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div>
        <button class=" volver score-panel btn float-start z-index-3" onclick="window.location.href='./../'">
        <i class="bi bi-arrow-left"></i> Volver
        </button>
    </div>
    
        <div class="game-container text-center">
            <div class="row mb-3">
                <div class="col-md-4">
                    <div class="score-panel">
                        <i class="bi bi-apple"></i> PUNTOS: <span id="scoreValue">0</span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="score-panel">
                        <i class="bi bi-clock-history"></i> TIEMPO: <span id="timerValue">0</span> s
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="score-panel">
                        <i class="bi bi-person-badge"></i> JUGADOR: <span id="playerNameDisplay">---</span>
                    </div>
                </div>
            </div>
            <!-- Tablero de juego -->
            <div class="d-flex justify-content-center mb-3">
                <div id="snakeGrid" class="grid"></div>
            </div>
            <!-- Botones de control rápidos -->
            <div class="d-flex gap-2 justify-content-center flex-wrap">
                <button id="newGameBtn" class="btn btn-game" data-bs-toggle="modal" data-bs-target="#newGameModal"><i class="bi bi-plus-circle"></i> Nueva partida</button>
                <button id="continueBtn" class="btn btn-game"><i class="bi bi-play-fill"></i> Continuar partida</button>
                <button id="scoresBtn" class="btn btn-game" data-bs-toggle="modal" data-bs-target="#scoresModal"><i class="bi bi-trophy-fill"></i> Tabla puntuaciones</button>
            </div>
            <footer class="mt-3">
                <i class="bi bi-arrow-up"></i> <i class="bi bi-arrow-down"></i> <i class="bi bi-arrow-left"></i> <i class="bi bi-arrow-right"></i>  |  Guardado automático
            </footer>
        </div>
    </div>
    <!-- MODAL NUEVA PARTIDA -->
    <div class="modal fade" id="newGameModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-warning">
                    <h5 class="modal-title"><i class="bi bi-controller"></i> Nueva partida</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Nombre de usuario:</label>
                    <input type="text" id="playerNameInput" class="form-control bg-dark text-light border-warning" placeholder="Ej: InvictusSnake" maxlength="20">
                    <div class="mt-3 text-warning small"><i class="bi bi-info-circle"></i> Se guardará tu puntuación al terminar</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="confirmNewGame" class="btn btn-game">¡Comenzar!</button>
                </div>
            </div>
        </div>
    </div>
    <!-- MODAL TABLA PUNTUACIONES -->
    <div class="modal fade" id="scoresModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header border-warning">
                    <h5 class="modal-title"><i class="bi bi-trophy"></i> Mejores puntuaciones</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table class="table table-dark-custom table-hover">
                        <thead>
                            <tr><th>#</th><th>Jugador</th><th>Puntos</th><th>Fecha</th></tr>
                        </thead>
                        <tbody id="scoresTableBody">
                            <tr><td colspan="4" class="text-center">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="snake.js"></script>
</body>
</html>
