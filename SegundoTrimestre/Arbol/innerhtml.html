<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Árbol con innerHTML</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    ul { list-style-type: none; padding-left: 1rem; }
    li { margin: 0.3rem 0; }
    li::before { content: "🌿 "; } /*Para que quede bonito cada rama.*/
  </style>
</head>
<body class="p-4">

  <h1 class="mb-3">Árbol usando innerHTML</h1>
  <div id="container"></div>
   <button class="btn btn-primary mb-3"><a href="index.html" class="text-white text-decoration-none">Volver</a></button>
  <script>
    let data = 
    {
      "Fish": { "trout": {}, "salmon": {} },
      "Tree": {
        "Huge": { "sequoia": {}, "oak": {} },
        "Flowering": { "apple tree": {}, "magnolia": {} }
      }
    };

    function createTreeHTML(obj) 
    {
      let html = '';
      for (let key in obj) {
        html += `<li class="border rounded p-1">${key}`;
        if (Object.keys(obj[key]).length > 0) {
          html += `<ul class="ms-3">${createTreeHTML(obj[key])}</ul>`;
        }
        html += `</li>`;
      }
      return html;
    }

    let container = document.getElementById('container');
    container.innerHTML = `<ul class="list-group">${createTreeHTML(data)}</ul>`;
  </script>
</body>
</html>
