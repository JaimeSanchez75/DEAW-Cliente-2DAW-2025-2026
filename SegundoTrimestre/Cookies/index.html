<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand">Mi Web</span>
    <div>
         <button class="btn btn-primary mb-3"><a href="../index.html" class="text-white text-decoration-none">Volver</a></button>
      <a href="otrapag.html" class="btn btn-light btn-sm">Otra página</a>
      <a href="config.html" class="btn btn-warning btn-sm">Config</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4 text-center">
        <h1 id="titulo"></h1>
        <p id="texto"></p>
    </div>
</div>

<script>
function getCookie(nombre) 
{
    const cookies = document.cookie.split("; ");
    for (let c of cookies) 
    {
        const [key, value] = c.split("=");
        if (key === nombre) return value;
    }
    return null;
}

const modo = getCookie("modo");
const idioma = getCookie("idioma");

if (!modo || !idioma) 
{
    window.location.href = "config.html";
} 
else 
{
    document.body.classList.add(modo);
    document.querySelector(".card").classList.add(modo);

    const titulo = document.getElementById("titulo");
    const texto = document.getElementById("texto");

    if (idioma === "es") 
    {
        titulo.textContent = "Bienvenido";
        texto.textContent = "Esta es la página principal.";
    } 
    else 
    {
        titulo.textContent = "Welcome";
        texto.textContent = "This is the main page.";
    }
}
</script>

</body>
</html>
