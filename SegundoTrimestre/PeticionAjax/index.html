<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios y Álbumes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .thumbnail { cursor: pointer; margin: 0.5rem; border: 1px solid #ddd; border-radius: 5px; padding: 0.3rem; }
    .thumbnail:hover { border-color: #007bff; }
    .modal-img { width: 100%; }
  </style>
</head>
<body class="p-4">

  <div class="container">
    <h1 class="mb-4">Usuarios y Álbumes</h1>
    <button class="btn btn-primary"><a href="../index.html" class="text-white text-decoration-none">Volver</a></button>
    <div id="app"></div>
  </div>

  <div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body p-0">
          <img src="" id="modalImg" class="modal-img">
        </div>
      </div>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');

    async function showUsers() 
    {
      app.innerHTML = '<p>Cargando usuarios...</p>';
      const res = await fetch('https://jsonplaceholder.typicode.com/users');
      const users = await res.json();

      let html = '<div class="row row-cols-1 row-cols-md-2 g-3">';
      users.forEach(user => {
        html += `
          <div class="col">
            <div class="card p-3 h-100">
              <h5>${user.name}</h5>
              <p>Username: ${user.username}</p>
              <p>Website: <a href="http://${user.website}" target="_blank">${user.website}</a></p>
              <button class="btn btn-primary" onclick="showAlbums(${user.id}, '${user.username}')">Ver Álbumes</button>
            </div>
          </div>
        `;
      });
      html += '</div>';
      app.innerHTML = html;
    }

    async function showAlbums(userId, username) 
    {
      app.innerHTML = '<p>Cargando álbumes...</p>';
      const res = await fetch(`https://jsonplaceholder.typicode.com/users/${userId}/albums`);
      const albums = await res.json();

      let html = `<button class="btn btn-secondary mb-3" onclick="showUsers()">← Volver a usuarios</button>`;
      html += `<h3>Álbumes de ${username}</h3><ul class="list-group">`;
      albums.forEach(album => {
        html += `
          <li class="list-group-item d-flex justify-content-between align-items-center">
            ${album.title}
            <button class="btn btn-sm btn-primary" onclick="showPhotos(${album.id}, '${username}', '${album.title}')">Ver fotos</button>
          </li>
        `;
      });
      html += '</ul>';
      app.innerHTML = html;
    }

    async function showPhotos(albumId, username, albumTitle) 
    {
      app.innerHTML = '<p>Cargando fotos...</p>';
      const res = await fetch(`https://jsonplaceholder.typicode.com/albums/${albumId}/photos`);
      const photos = await res.json();

      let html = `
        <button class="btn btn-secondary mb-3" onclick="showUsers()">← Volver a usuarios</button>
        <button class="btn btn-secondary mb-3 ms-2" onclick="showAlbums(${photos[0].albumId}, '${username}')">← Volver a álbumes</button>
        <h3>Fotos de ${albumTitle} - ${username}</h3>
        <div class="d-flex flex-wrap">
      `;

      photos.forEach(photo => 
      {
        html += `
          <div class="text-center">
            <img src="${photo.thumbnailUrl}" class="thumbnail" onclick="openModal('${photo.url}')">
            <p class="small">${photo.title}</p>
          </div>
        `;
      });

      html += '</div>';
      app.innerHTML = html;
    }

    function openModal(url) 
    {
      const modalImg = document.getElementById('modalImg');
      modalImg.src = url;
      const modal = new bootstrap.Modal(document.getElementById('photoModal'));
      modal.show();
    }

    showUsers();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
