<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tamagotchi de Palo</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <button class=" volver  btn float-start z-index-3" onclick="window.location.href='./../'">
        <i class="bi bi-arrow-left"></i> Volver
    </button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="tamagotchi-card text-center">
                    <!-- Stickman canvas (17x17 píxeles lógicos, escalado) -->
                    <div class="canvas-container mb-3">
                        <canvas id="stickmanCanvas" width="170" height="170" style="width:170px; height:170px;"></canvas>
                    </div>
                    <h3 id="petName" class="mt-2 text-warning-emphasis">Cargando...</h3>
                    
                    <!-- Estadísticas -->
                    <div class="mt-4">
                        <div class="d-flex justify-content-between stat-label">
                            <span><i class="bi bi-egg-fried"></i> Hambre</span>
                            <span id="hambreValue">100</span>
                        </div>
                        <div class="progress mb-3">
                            <div id="hambreBar" class="progress-bar bg-danger" role="progressbar" style="width: 100%">100%</div>
                        </div>

                        <div class="d-flex justify-content-between stat-label">
                            <span><i class="bi bi-balloon-heart"></i> Diversión</span>
                            <span id="diversionValue">100</span>
                        </div>
                        <div class="progress mb-3">
                            <div id="diversionBar" class="progress-bar bg-success" role="progressbar" style="width: 100%">100%</div>
                        </div>

                        <div class="d-flex justify-content-between stat-label">
                            <span><i class="bi bi-moon-stars"></i> Energía</span>
                            <span id="energiaValue">100</span>
                        </div>
                        <div class="progress mb-3">
                            <div id="energiaBar" class="progress-bar bg-info" role="progressbar" style="width: 100%">100%</div>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-3 justify-content-center my-4 flex-wrap">
                        <button id="btnComer" class="btn btn-warning btn-action"><i class="bi bi-apple"></i> Comer (+15)</button>
                        <button id="btnJugar" class="btn btn-primary btn-action"><i class="bi bi-dice-6"></i> Jugar (+12)</button>
                        <button id="btnDormir" class="btn btn-secondary btn-action"><i class="bi bi-moon"></i> Dormir (+20)</button>
                    </div>

                    <!-- Log -->
                    <div class="mt-3">
                        <p class="mb-1 fw-bold text-secondary"><i class="bi bi-chat-dots"></i> Registro de vida</p>
                        <ul id="logList" class="list-unstyled log-list text-start">
                            <li>✨ ¡Bienvenido! Cuida bien de tu stickman ✨</li>
                        </ul>
                    </div>
                    <footer class="mt-3">
                        <i class="bi bi-heart-fill text-danger"></i> El stickman cambia su cara según su felicidad.
                    </footer>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="tamagochi.js"></script>
</body>
</html>
