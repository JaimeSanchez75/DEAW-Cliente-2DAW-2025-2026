<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Lista de pares desde el -10 hasta el 10 : </h2>
    <script>
        let i=-10;
        for(i=-10;i<=10;i++)
        {
            if(i%2==0){
                document.write(i+"<br>");
            }
        }
    </script>
</body>
</html>
